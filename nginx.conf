server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cabeceras de seguridad HTTP
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-Frame-Options          "DENY"                           always;
    add_header Referrer-Policy          "no-referrer-when-downgrade"     always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
    # CSP adaptada para Angular (necesita unsafe-inline para estilos; scripts de bundle propio)
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.igdb.com; font-src 'self' data:; connect-src 'self' https://proyecto-nebula.up.railway.app; frame-ancestors 'none';"
      always;

    # Enruta todas las URLs al index.html (necesario para Angular Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash (generados por Angular) → caché larga, inmutable
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cachear el HTML de entrada ni el service worker
    location ~* (index\.html|ngsw\.json|manifest\.webmanifest)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
