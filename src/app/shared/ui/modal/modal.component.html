<p-dialog
  appendTo="body"
  [header]="gallery ? '' : (header ?? '')"
  [showHeader]="!gallery && showHeader"
  [visible]="visible"
  (onHide)="onHide()"
  (onShow)="onShow()"
  [modal]="modal"
  [closable]="closable"
  [dismissableMask]="false"
  [closeOnEscape]="closeOnEscape"
  [maskStyleClass]="maskClass"
  [maskStyle]="activeMaskStyle"
  [contentStyle]="gallery ? galleryContentStyle : undefined"
  [style]="gallery ? galleryPanelStyle : { width: width }"
  [styleClass]="gallery ? 'app-modal-gallery-dlg' : ''"
>
  @if (gallery && (gallerySrc || galleryEmbedUrl)) {
    <div style="display: flex; align-items: center">
      @if (galleryTotal > 1) {
        <button
          type="button"
          (click)="onPrevClick($event)"
          aria-label="Anterior"
          style="
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 0 12px;
            line-height: 1;
            flex-shrink: 0;
          "
        >
          <i class="pi pi-angle-left" style="font-size: 5rem"></i>
        </button>
      }
      <div
        style="
          flex: 1;
          display: flex;
          justify-content: center;
          align-items: center;
          position: relative;
          min-height: 120px;
        "
      >
        @if (gallerySrc && !imageLoaded) {
          <div
            style="
              position: absolute;
              width: 40px;
              height: 40px;
              border: 3px solid rgba(255, 255, 255, 0.2);
              border-top-color: #fff;
              border-radius: 50%;
              animation: gallery-spin 0.75s linear infinite;
            "
          ></div>
        }
        @if (gallerySrc) {
          <img
            [src]="gallerySrc"
            [alt]="galleryAlt"
            [style.opacity]="imageLoaded ? '1' : '0'"
            style="
              max-width: 85vw;
              max-height: 85vh;
              object-fit: contain;
              display: block;
              transition: opacity 0.2s ease;
              border-radius: 20px;
            "
            (load)="onImageLoad()"
            (error)="onImageLoad()"
          />
        }
        @if (galleryEmbedUrl && safeEmbedUrl) {
          <div style="width: min(85vw, calc(85vh * 16 / 9)); aspect-ratio: 16 / 9">
            <iframe
              [src]="safeEmbedUrl"
              frameborder="0"
              allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              style="width: 100%; height: 100%; border: none; border-radius: 12px; display: block"
            ></iframe>
          </div>
        }
      </div>
      @if (galleryTotal > 1) {
        <button
          type="button"
          (click)="onNextClick($event)"
          aria-label="Siguiente"
          style="
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 0 12px;
            line-height: 1;
            flex-shrink: 0;
          "
        >
          <i class="pi pi-angle-right" style="font-size: 5rem"></i>
        </button>
      }
    </div>
    @if (galleryTotal > 1) {
      <div style="text-align: center; color: #fff; padding: 8px 0 4px; font-size: 0.85rem; opacity: 0.7">
        {{ galleryIndex + 1 }} / {{ galleryTotal }}
      </div>
    }
  }
  <ng-content></ng-content>
</p-dialog>
