@if (!isProd) {
  <div class="auth-status">
    @if (user) {
      <p-avatar
        [image]="user.avatar?.imageUrl ?? 'assets/default-avatar.png'"
        shape="circle"
        styleClass="avatar"
      ></p-avatar>
      <span class="username">{{ user.username }}</span>
    } @else {
      <span class="username not-logged">Sin sesión</span>
    }
    <select class="debug-switch" (change)="switchUser($event)" title="Cambiar usuario (debug)">
      <option value="">— Cambiar usuario —</option>
      @for (u of users; track u.id) {
        <option [value]="u.id">{{ u.username }}</option>
      }
    </select>
    <label class="debug-toggle">
      <input type="checkbox" [checked]="passwordValidationEnabled()" (change)="onTogglePasswordValidation($event)" />
      Validar contraseñas (frontend)
    </label>
    @if (user) {
      <button class="logout" (click)="logout()" title="Cerrar sesión">✕</button>
    }
  </div>
}
