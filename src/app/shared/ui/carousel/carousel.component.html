<p-carousel
  [value]="items"
  [numVisible]="_numVisible"
  [numScroll]="numScroll"
  [circular]="circular"
  [showIndicators]="showIndicators"
  [styleClass]="styleClass"
>
  <ng-template pTemplate="item" let-item let-i="index">
    <ng-container *ngIf="itemTpl" [ngTemplateOutlet]="itemTpl" [ngTemplateOutletContext]="{ $implicit: item, index: i }"></ng-container>
  </ng-template>

</p-carousel>
