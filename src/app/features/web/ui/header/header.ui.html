<header class="header-wrapper" [class.scrolled]="isScrolled">
  <div class="header-content">
    <div class="header-row">
      <!-- Left: hamburger (mobile) + logo -->
      <div class="left">
        <button
          type="button"
          class="mobile-hamburger"
          (click)="drawerVisible = !drawerVisible"
          aria-label="Toggle menu"
        >
          <i class="pi pi-bars" aria-hidden="true"></i>
        </button>

        <a class="desktop-logo" routerLink="/">
          <img src="logo_nebula.png" alt="Nebula" class="logo-img" />
        </a>
      </div>

      <!-- Center: manual nav -->
      <nav class="center">
        <ul class="nav-list">
          @for (it of items; track it.label) {
            <li class="nav-item" [ngClass]="it.styleClass">
              <a [routerLink]="it.routerLink" class="nav-link">
                @if (it.icon) {
                  <i [class]="it.icon + ' nav-icon'"></i>
                }
                <span class="nav-text">{{ it.label }}</span>
              </a>
            </li>
          }
        </ul>
      </nav>

      <!-- Right: avatar / login -->
      <div class="right">
        @if (auth.isAuthenticated()) {
          <span class="header-username">{{ currentUser?.username }}</span>
          <p-avatar
            [image]="currentAvatarUrl ?? 'assets/default-avatar.png'"
            shape="circle"
            styleClass="cursor-pointer border-1 border-300"
            (click)="menuPerfil.toggle($event)"
          ></p-avatar>
          <p-tieredMenu #menuPerfil [model]="profileItems" [popup]="true"></p-tieredMenu>
        } @else {
          <a class="btn ghost" href="/auth/login" (click)="openLoginModal(); $event.preventDefault()">Login</a>
          <a class="btn" [routerLink]="['/auth/join']">Join</a>
        }
      </div>
    </div>

    <!-- Mobile centered logo (when desktop logo hidden) -->
    <div class="mobile-logo" aria-hidden="true">
      <a routerLink="/">
        <img src="logo_nebula.png" alt="Nebula" class="logo-img" />
      </a>
    </div>

    <!-- Manual drawer + overlay for mobile -->
    <div
      class="overlay"
      [class.open]="drawerVisible"
      role="button"
      aria-label="Cerrar menú"
      tabindex="0"
      (click)="drawerVisible = false"
      (keydown.enter)="drawerVisible = false"
      (keydown.space)="drawerVisible = false"
    ></div>

    <aside class="drawer-panel" [class.open]="drawerVisible" role="dialog" aria-hidden="{{ !drawerVisible }}">
      <nav>
        <ul class="drawer-list">
          @for (it of items; track it.label) {
            <li class="drawer-item">
              <a [routerLink]="it.routerLink" (click)="drawerVisible = false" class="drawer-link">
                <span>{{ it.label }}</span>
              </a>
            </li>
          }
        </ul>
      </nav>
    </aside>
    <!-- Login modal (opened from header) -->
    <app-modal [(visible)]="showLoginModal" [width]="'420px'">
      <app-login-form [returnUrl]="loginReturnUrl" (loggedIn)="onLoginSuccess()"></app-login-form>
    </app-modal>
  </div>
</header>
