<div class="game-featured-wrapper">
  <div class="game-featured-track">
    @for (game of featuredGames(); track game.id; let i = $index) {
      <div
        class="game-featured-slide"
        [class.is-active]="i === currentPage()"
        [class.is-leaving]="i === prevPage() && i !== currentPage()"
        [attr.aria-hidden]="i !== currentPage()"
      >
        <app-game-hero [game]="game" mode="featured"></app-game-hero>
      </div>
    }
  </div>
  <button
    type="button"
    class="carousel-pause-btn"
    (click)="togglePause()"
    [attr.aria-label]="paused() ? 'Reanudar presentación de juegos' : 'Pausar presentación de juegos'"
    [attr.aria-pressed]="paused()"
  >
    <i class="pi" [class.pi-pause]="!paused()" [class.pi-play]="paused()" aria-hidden="true"></i>
  </button>
</div>

  @if (featuredGames().length > 1) {
    <div class="game-featured-dots" role="tablist" aria-label="Selector de juegos destacados">
      @for (game of featuredGames(); track game.id; let i = $index) {
        <button
          type="button"
          class="game-featured-dot"
          [class.is-active]="i === currentPage()"
          (click)="goTo(i)"
          [attr.aria-label]="'Ir a ' + (game.title || ('slide ' + (i + 1)))"
        ></button>
      }
    </div>
  }
