<p-carousel
  [value]="featuredGames()"
  [numVisible]="1"
  [numScroll]="1"
  [circular]="true"
  [showNavigators]="false"
  [autoplayInterval]="autoplayInterval"
  class="game-featured-carousel"
>
  <ng-template pTemplate="item" let-game>
    <app-game-hero [game]="game" mode="featured"></app-game-hero>
  </ng-template>
</p-carousel>
