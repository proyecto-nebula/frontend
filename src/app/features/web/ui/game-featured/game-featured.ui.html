<div class="game-featured-wrapper">
  <p-carousel
    [value]="featuredGames()"
    [numVisible]="1"
    [numScroll]="1"
    [circular]="true"
    [showNavigators]="false"
    [autoplayInterval]="0"
    [page]="currentPage()"
    (pageChange)="onPageChange($any($event))"
    class="game-featured-carousel"
  >
    <ng-template pTemplate="item" let-game>
      <app-game-hero [game]="game" mode="featured"></app-game-hero>
    </ng-template>
  </p-carousel>
  <button
    type="button"
    class="carousel-pause-btn"
    (click)="togglePause()"
    [attr.aria-label]="paused() ? 'Reanudar presentaci\u00f3n de juegos' : 'Pausar presentaci\u00f3n de juegos'"
    [attr.aria-pressed]="paused()"
  >
    <i class="pi" [class.pi-pause]="!paused()" [class.pi-play]="paused()" aria-hidden="true"></i>
  </button>
</div>
