<p-carousel
  [value]="featuredGames()"
  [numVisible]="1"
  [numScroll]="1"
  [circular]="true"
  [showNavigators]="false"
  [autoplayInterval]="autoplayInterval"
  class="game-featured-carousel"
>
  <ng-template pTemplate="item" let-game>
    <div class="featured-item">
      @if (game?.heroUrl) {
        <img [src]="game.heroUrl" [alt]="game.title" class="featured-hero" />
      }

      <div class="featured-meta">
        @if (game?.logoUrl) {
          <img [src]="game.logoUrl" [alt]="game.title" class="featured-logo" />
        } @else {
          <h2>{{ game.title }}</h2>
        }

        @if (game?.summary) {
          <p class="featured-summary">{{ game.summary }}</p>
        }
      </div>
    </div>
  </ng-template>
</p-carousel>
