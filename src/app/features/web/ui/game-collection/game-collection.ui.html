<section class="game-collection">
  <header *ngIf="title">
    <h3>{{ title }}</h3>
  </header>

  <app-carousel
    [items]="collection()"
    [styleClass]="'game-collection-carousel'"
    [showIndicators]="false"
    [itemMinWidth]="300"
  >
    <ng-template let-game let-i="index">
      <div class="collection-item">
        <app-game-card
          [title]="game.title"
          [bannerUrl]="game.bannerUrl"
          [coverUrl]="game.coverUrl"
          [slug]="game.slug ?? ''"
        ></app-game-card>
      </div>
    </ng-template>
  </app-carousel>
</section>
