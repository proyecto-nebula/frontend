<app-carousel
  [items]="mediaItems"
  [styleClass]="'game-screenshots-carousel'"
  [showIndicators]="false"
  [itemMinWidth]="240"
  [gap]="20"
  [mask]="true"
>
  <ng-template let-item>
    @if (item.kind === 'video') {
      <div class="video-thumb">
        <button type="button" (click)="openItem(item)" class="media-thumb-btn" [attr.aria-label]="'Abrir vídeo'">
          <div class="video-thumb__img-wrap">
            <img
              [src]="'https://img.youtube.com/vi/' + item.videoId + '/mqdefault.jpg'"
              alt="Vídeo"
              class="media-thumb-img"
              loading="lazy"
            />
            <div class="video-thumb__play">
              <i class="pi pi-play-circle"></i>
            </div>
          </div>
        </button>
      </div>
    } @else {
      <div class="screenshot-thumb">
        <button
          type="button"
          (click)="openItem(item)"
          class="media-thumb-btn"
          [attr.aria-label]="'Abrir screenshot ' + (item.__idx + 1)"
        >
          <div class="screenshot-thumb__img-wrap">
            <img
              [src]="item.thumbUrl"
              [alt]="'Screenshot ' + (item.__idx + 1)"
              class="media-thumb-img"
              loading="lazy"
            />
          </div>
        </button>
      </div>
    }
  </ng-template>
</app-carousel>
