<app-carousel
  [items]="screenshotsWithIndex"
  [itemMinWidth]="250"
  [styleClass]="'game-screenshots-carousel'"
  [showIndicators]="false"
>
  <ng-template let-screenshot>
    <div class="screenshot-thumb" style="width: 100%; box-sizing: border-box">
      <button
        type="button"
        (click)="openScreenshot(screenshot.__idx)"
        style="all: unset; cursor: pointer; display: block; width: 100%"
      >
        <img
          [src]="screenshot.thumbUrl"
          [alt]="'Screenshot ' + (screenshot.__idx + 1)"
          style="width: 100%; height: auto; object-fit: cover; border-radius: 8px"
          loading="lazy"
        />
      </button>
    </div>
  </ng-template>
</app-carousel>
