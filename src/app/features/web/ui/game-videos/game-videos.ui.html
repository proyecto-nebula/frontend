<app-carousel
  [items]="videosWithIndex"
  [styleClass]="'game-videos-carousel'"
  [showIndicators]="false"
  [itemMinWidth]="240"
  [gap]="20"
  [mask]="true"
>
  <ng-template let-video>
    <div class="video-thumb">
      <button
        type="button"
        (click)="openVideo(video.__idx)"
        class="media-thumb-btn"
        [attr.aria-label]="'Abrir vídeo ' + (video.__idx + 1)"
      >
        <div class="video-thumb__img-wrap">
          <img
            [src]="'https://img.youtube.com/vi/' + video.videoId + '/mqdefault.jpg'"
            [alt]="'Vídeo ' + (video.__idx + 1)"
            class="media-thumb-img"
          />
          <div class="video-thumb__play">
            <i class="pi pi-play-circle"></i>
          </div>
        </div>
      </button>
    </div>
  </ng-template>
</app-carousel>
