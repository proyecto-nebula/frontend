<div class="join-page">
  <div class="join-root">
    <div class="sr-only" aria-live="polite" aria-atomic="true">Paso {{ phase + 1 }} de 5</div>
    <div class="phases" [style.transform]="'translateX(-' + phase * 20 + '%)'">
      <!-- Fase 0: Cuenta -->
      <section class="phase">
        <h1>Crea tu cuenta</h1>
        <auth-registration-account-ui
          [formGroup]="account"
          [showValidation]="showValidation"
          [passwordValidationEnabled]="(settings.passwordValidationEnabled$ | async) || false"
        ></auth-registration-account-ui>
      </section>

      <!-- Fase 1: Verificación de email -->
      <section class="phase">
        <h1>Verifica tu correo</h1>
        <auth-registration-verify-email-ui [email]="account.get('email')?.value"></auth-registration-verify-email-ui>
      </section>

      <!-- Fase 2: Perfil -->
      <section class="phase">
        <h1>Tu perfil</h1>
        <auth-registration-profile-ui
          [formGroup]="profile"
          [avatars]="avatars"
          (avatarSelected)="onAvatarSelected($event)"
        ></auth-registration-profile-ui>
      </section>

      <!-- Fase 3: Plan -->
      <section class="phase">
        <h1>Elige tu plan</h1>
        <auth-registration-plan-ui [group]="plan" [plans]="plans"></auth-registration-plan-ui>
      </section>

      <!-- Fase 4: Pago -->
      <section class="phase">
        <h1>Datos de pago</h1>
        @if (processingPayment || saving) {
          <div class="join-processing" role="status" aria-live="polite" aria-busy="true">
            <div class="join-processing__spinner" aria-hidden="true"></div>
            <p class="join-processing__text">Procesando pago seguro...</p>
          </div>
        } @else {
          <auth-registration-payment-ui [group]="payment"></auth-registration-payment-ui>
        }
      </section>
    </div>

    <div class="controls">
      <button class="btn ghost" (click)="back()" [disabled]="phase === 0 || processingPayment || saving">Atrás</button>
      <button class="btn" (click)="next()" [disabled]="processingPayment || saving">{{ nextLabel }}</button>
    </div>
  </div>
</div>
