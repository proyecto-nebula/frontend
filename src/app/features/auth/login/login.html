<div class="login-container w-full h-screen flex justify-content-center align-items-center">
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
    <h2>Acceso a Nebula</h2>

    @if (errorMessage()) {
      <div class="error-banner">
        {{ errorMessage() }}
      </div>
    }

    <div class="form-group">
      <label for="email_usuario">Email</label>
      <input
        id="email_usuario"
        type="email"
        formControlName="email_usuario"
        placeholder="Ej: usuario@dominio.com"
        [class.invalid]="loginForm.get('email_usuario')?.touched && loginForm.get('email_usuario')?.invalid"
      />
    </div>

    <div class="form-group">
      <label for="password_usuario">Contraseña</label>
      <input
        id="password_usuario"
        type="password"
        formControlName="password_usuario"
        placeholder="••••••••"
        [class.invalid]="loginForm.get('password_usuario')?.touched && loginForm.get('password_usuario')?.invalid"
      />
    </div>

    <button type="submit" [disabled]="loginForm.invalid || loading()">
      @if (loading()) {
        <span>Cargando...</span>
      } @else {
        <span>Entrar</span>
      }
    </button>
  </form>
</div>
