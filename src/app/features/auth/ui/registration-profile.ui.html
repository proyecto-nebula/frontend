<div class="reg-profile" [formGroup]="group">

  <div class="reg-field">
    <label class="reg-label">Nombre público</label>
    <input class="reg-input" type="text" formControlName="username" placeholder="Tu nombre en Nebula" autocomplete="nickname" />
    @if (group.get('username')?.invalid && group.get('username')?.touched) {
      <div class="reg-error">El nombre público es obligatorio</div>
    }
  </div>

  <div class="reg-field">
    <label class="reg-label">Elige tu avatar</label>
    <div class="avatar-grid">
      @for (a of avatars; track a.id) {
        <button
          type="button"
          class="avatar-btn"
          (click)="selectAvatar(a.id)"
          (keyup.enter)="selectAvatar(a.id)"
          [class.selected]="group.get('avatarId')?.value === a.id"
          [attr.aria-pressed]="group.get('avatarId')?.value === a.id"
          [attr.title]="a.name || ('Avatar ' + a.id)"
        >
          <img [src]="a.imageUrl" [alt]="a.name || 'avatar'" />
        </button>
      }
    </div>
    @if (group.get('avatarId')?.invalid && group.get('avatarId')?.touched) {
      <div class="reg-error">Selecciona un avatar</div>
    }
  </div>

</div>
