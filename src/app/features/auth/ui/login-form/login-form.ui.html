<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <div class="login-logo">
      <app-logo height="42px" />
    </div>
    <h2>Acceso a Nebula</h2>

    @if (errorMessage()) {
      <div class="error-banner" role="alert" aria-live="assertive">
        {{ errorMessage() }}
      </div>
    }

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Ej: usuario@dominio.com"
        [class.invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
      />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="••••••••"
        [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
      />
    </div>

    <div class="login-extras">
      <label class="login-remember">
        <input type="checkbox" formControlName="rememberMe" />
        <span>Recordar en este equipo</span>
      </label>
      <a href="#" class="login-forgot" (click)="$event.preventDefault()">Olvidé mi contraseña</a>
    </div>

    <button type="submit" [disabled]="loginForm.invalid || loading()">
      @if (loading()) {
        <span>Cargando...</span>
      } @else {
        <span>Entrar</span>
      }
    </button>
  </form>
</div>
