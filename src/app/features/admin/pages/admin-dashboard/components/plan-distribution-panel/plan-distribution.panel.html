<div class="dashboard-panel">
  <div class="panel-header">
    <h3>💳 Distribución de Planes</h3>
  </div>

  @if (loading()) {
    <div class="loader-container">
      <p-progressSpinner
        [style]="{ width: '40px', height: '40px' }"
        strokeWidth="4"
        fill="transparent"
        animationDuration=".8s"
      />
    </div>
  } @else {
    @if (distribution().length > 0) {
      <div class="distribution-list">
        @for (item of distribution(); track item.id) {
          <div class="distribution-item">
            <div class="label">
              <span class="name">{{ item.name }}</span>
              <span class="count">{{ item.count }} usuarios</span>
            </div>
            <div class="bar-row">
              <div class="bar-container">
                <div class="bar" [style.width.%]="item.percentage || 0"></div>
              </div>
              <span class="percent">{{ item.percentage?.toFixed(1) || '0.0' }}%</span>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="empty-state">Sin datos</div>
    }
  }
</div>
