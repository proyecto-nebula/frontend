<div class="dashboard-panel">
  <div class="panel-header">
    <h3>Más Jugados</h3>
    <div class="period-tabs">
      <button [class.active]="selectedPeriod() === 'day'" (click)="selectPeriod('day')">Hoy</button>
      <button [class.active]="selectedPeriod() === 'week'" (click)="selectPeriod('week')">Semana</button>
      <button [class.active]="selectedPeriod() === 'month'" (click)="selectPeriod('month')">Mes</button>
    </div>
  </div>

  @if (loading()) {
    <div class="loader-container">
      <p-progressSpinner
        [style]="{ width: '40px', height: '40px' }"
        strokeWidth="4"
        fill="transparent"
        animationDuration=".8s"
      />
    </div>
  } @else {
    @if (games().length > 0) {
      <div class="games-list">
        @for (game of games(); track game.id; let i = $index) {
          <div class="game-item" [class.top]="i < 3">
            <div class="item-rank">
              <span class="rank-badge">{{ i + 1 }}</span>
            </div>

            <div class="item-content">
              <div class="game-info">
                @if (game.bannerUrl || game.coverUrl) {
                  <img [src]="game.bannerUrl || game.coverUrl" [alt]="game.title" class="game-banner" />
                }
                <div class="game-text">
                  <div class="game-title">{{ game.title }}</div>
                </div>
              </div>
            </div>

            <div class="item-stats">
              <span class="stat-value">{{ formatDuration(game.totalDuration) }}</span>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="empty-state">
        <p>No hay datos para este período</p>
      </div>
    }
  }
</div>
