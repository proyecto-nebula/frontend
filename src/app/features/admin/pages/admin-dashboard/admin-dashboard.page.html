<div class="admin-dashboard">
  <div class="dashboard-header">
    <div class="header-content">
      <h1>Dashboard</h1>
    </div>
  </div>

  <div class="dashboard-grid">
    <!-- Barra KPI global (full width) -->
    <div class="grid-item span-full">
      <app-platform-overview-panel />
    </div>

    <!-- Row 1: Usuarios activos, Nuevos registros, Distribución de planes -->
    <div class="grid-item">
      <app-active-users-panel />
    </div>
    <div class="grid-item">
      <app-new-users-panel />
    </div>
    <div class="grid-item">
      <app-plan-distribution-panel />
    </div>

    <!-- Row 2: Más jugados, Juegos favoritos, Distribución PEGI -->
    <div class="grid-item">
      <app-top-games-panel />
    </div>
    <div class="grid-item">
      <app-favorite-games-panel />
    </div>
    <div class="grid-item">
      <app-pegi-distribution-panel />
    </div>

    <!-- Row 3: Géneros más jugados, Géneros favoritos, Studios top -->
    <div class="grid-item">
      <app-top-categories-panel />
    </div>
    <div class="grid-item">
      <app-favorite-categories-panel />
    </div>
    <div class="grid-item">
      <app-top-studios-panel />
    </div>

    <!-- Row 4: Sesiones, Retención, Reportes -->
    <div class="grid-item">
      <app-session-stats-panel />
    </div>
    <div class="grid-item">
      <app-retention-rate-panel />
    </div>
    <div class="grid-item">
      <app-pending-reports-panel />
    </div>
  </div>
</div>
