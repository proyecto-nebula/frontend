<div class="admin-dashboard">
  <div class="dashboard-header">
    <div class="header-content">
      <h1>📊 Dashboard</h1>
      <p class="subtitle">Estadísticas y análisis de la plataforma</p>
    </div>
  </div>

  <div class="dashboard-grid">
    <!-- Barra KPI global (full width) -->
    <div class="grid-item span-full">
      <app-platform-overview-panel />
    </div>

    <!-- Row 1: Juegos, Favoritos, Reportes -->
    <div class="grid-item">
      <app-top-games-panel />
    </div>
    <div class="grid-item">
      <app-favorite-games-panel />
    </div>
    <div class="grid-item">
      <app-pending-reports-panel />
    </div>

    <!-- Row 2: Actividad usuarios, Categorías -->
    <div class="grid-item">
      <app-active-users-panel />
    </div>
    <div class="grid-item">
      <app-top-categories-panel />
    </div>
    <div class="grid-item">
      <app-favorite-categories-panel />
    </div>

    <!-- Row 3: Studios y Distribuciones -->
    <div class="grid-item">
      <app-top-studios-panel />
    </div>
    <div class="grid-item">
      <app-pegi-distribution-panel />
    </div>
    <div class="grid-item">
      <app-plan-distribution-panel />
    </div>

    <!-- Row 4: Sesiones, Retención, Nuevos registros -->
    <div class="grid-item">
      <app-session-stats-panel />
    </div>
    <div class="grid-item">
      <app-retention-rate-panel />
    </div>
    <div class="grid-item">
      <app-new-users-panel />
    </div>
  </div>
</div>
