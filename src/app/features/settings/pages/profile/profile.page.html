<div class="settings-container">
  <div class="settings-card">
    <h1>Mi Perfil</h1>

    @if (error(); as err) {
      <div class="settings-alert alert-error" role="alert">
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        <span>{{ err }}</span>
      </div>
    }

    @if (success()) {
      <div class="settings-alert alert-success" role="alert">
        <i class="pi pi-check-circle" aria-hidden="true"></i>
        <span>Perfil actualizado correctamente</span>
      </div>
    }

    @if (form(); as f) {
      <form [formGroup]="f" class="settings-form">
        <!-- Usar componente reutilizable de registro -->
        <auth-registration-profile-ui
          [formGroup]="f"
          [avatars]="avatars() ?? []"
        ></auth-registration-profile-ui>

        <!-- Action Buttons -->
        <div class="form-actions">
          <button
            type="button"
            class="btn"
            (click)="saveChanges()"
            [disabled]="loading() || !f.valid || !hasChanges()"
          >
            @if (loading()) {
              <i class="pi pi-spin pi-spinner" aria-hidden="true"></i> Guardando...
            } @else {
              <i class="pi pi-save" aria-hidden="true"></i> Guardar Cambios
            }
          </button>
        </div>
      </form>
    }
  </div>
</div>
