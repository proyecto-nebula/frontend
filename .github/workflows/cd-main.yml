name: Continuous Deployment - Main

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Compilación y Publicación en Producción
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Instalar Entorno Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalación Limpia de Dependencias
      run: npm ci

    - name: Suite de Verificación de Regresiones
      run: npm run test -- --watch=false --browsers=ChromeHeadless

    - name: Build con Optimizaciones de Producción
      run: npm run build -- --configuration=production

    - name: Despliegue Automatizado en Vercel
      if: success()
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
