name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  production-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm test -- --watch=false --browsers=ChromeHeadless

      - run: npm run build -- --configuration production
