name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  frontend:
    name: Frontend — Vitest + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Run unit tests (Vitest)
        run: |
          npm test

      - name: Build production
        run: |
          npx ng build --configuration production --no-progress

  e2e:
    if: >-
      github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    name: Frontend — E2E (Playwright)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --progress=false || npm install

      - name: Build production
        run: |
          npx ng build --configuration production --no-progress

      - name: Serve production build
        run: |
          npx http-server dist/frontend -p 4200 -c-1 > server.log 2>&1 &
          for i in $(seq 1 30); do curl --silent --fail http://127.0.0.1:4200/ && break || sleep 1; done

      - name: Run Playwright tests
        run: |
          npx playwright test --config=playwright.config.ts --reporter=list
